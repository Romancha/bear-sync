services:
  hub:
    build: .
    image: ghcr.io/romancha/bear-sync-hub:latest
    restart: unless-stopped
    environment:
      SALMON_HUB_HOST: "0.0.0.0"
      SALMON_HUB_DB_PATH: /data/hub.db
      SALMON_HUB_ATTACHMENTS_DIR: /data/attachments
      SALMON_HUB_CONSUMER_TOKENS: ocw:asd1
      SALMON_HUB_BRIDGE_TOKEN: asd2
    volumes:
      - hub-data:/data
    expose:
      - "7433"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7433/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 256m
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - internal

volumes:
  hub-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
